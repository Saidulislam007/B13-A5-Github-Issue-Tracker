
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  

  <!-- tailwindcss -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- font awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

  <!-- favicon -->
  <link rel="icon" type="image/png" href="https://github.githubassets.com/favicons/favicon.png" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#4f46e5",
          },
          fontFamily: {
            geist: ["Geist", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="font-geist bg-slate-50 min-h-screen text-slate-800">
  <!-- login page -->

  <div id="loginPage" class="flex items-center justify-center min-h-screen p-4 bg-slate-50">
    <div class="bg-white p-10 rounded-2xl shadow-sm border border-slate-100 w-full max-w-[450px] text-center">
      <i class="fa-brands fa-github text-7xl mb-6 text-slate-800"></i>
      <h1 class="text-2xl font-bold mb-1 text-slate-900">
        GitHub Issues Tracker
      </h1>
      <p class="text-slate-400 text-sm mb-8">Sign in to manage your issues</p>

      <form id="loginForm" class="space-y-5 text-left">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-slate-700">Username</label>
          <input type="text" id="username"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-600 transition-colors"
            placeholder="Enter Username" />
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-slate-700">Password</label>
          <input type="password" id="password"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-600 transition-colors"
            placeholder="Enter Password" />
        </div>
        <button type="submit"
          class="w-full bg-[#4f00ff] text-white font-bold py-3 rounded-lg hover:bg-[#4300d9] shadow-md transition-all mt-2">
          Sign In
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100">
        <div
          class="relative -top-[38px] bg-white px-4 inline-block text-slate-400 text-xs font-bold uppercase tracking-widest">
          OR
        </div>
        <p class="text-slate-400 text-xs mb-3">Demo Credentials:</p>
        <div class="bg-slate-50 rounded-lg p-4 border border-slate-100">
          <p class="text-sm font-bold text-slate-700">
            Username: <span class="font-normal text-slate-500">admin</span>
          </p>
          <p class="text-sm font-bold text-slate-700">
            Password: <span class="font-normal text-slate-500">admin123</span>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- dashboard -->

  <div id="dashboardPage" class="hidden flex-col min-h-screen">
    <nav
      class="bg-white border-b px-3 sm:px-4 md:px-6 py-3 md:py-4 flex justify-between items-center sticky top-0 z-10 gap-3">
      <div class="flex items-center gap-2 font-bold text-base md:text-lg shrink-0">
        <i class="fa-brands fa-github text-2xl md:text-lg"></i>
        <span class="text-sm md:hidden">GitHub</span>
        <span class="hidden md:inline">GitHub Issues Tracker</span>
      </div>

      <div class="flex gap-2 items-center">
        <form id="searchForm" class="relative">
          <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input type="text" id="searchInput" placeholder="Search issues..."
            class="border rounded-md pl-9 pr-3 py-1.5 text-xs sm:text-sm w-32 sm:w-40 md:w-56 lg:w-64 outline-none focus:border-primary" />
        </form>

        <button class="bg-primary text-white px-3 sm:px-4 py-1.5 rounded-md text-xs sm:text-sm font-medium">
          Search
        </button>
      </div>
    </nav>

    <main class="p-4 sm:p-5 md:p-6 max-w-7xl mx-auto w-full">
      <div class="gap-2 rounded-lg p-1 inline-flex mb-6">
        <button onclick="setTab('All')" id="tab-All"
          class="px-4 sm:px-6 py-1.5 rounded-md text-xs sm:text-sm font-medium bg-primary text-white">
          All
        </button>
        <button onclick="setTab('Open')" id="tab-Open"
          class="px-4 sm:px-6 py-1.5 rounded-md text-xs sm:text-sm font-medium text-slate-600">
          Open
        </button>
        <button onclick="setTab('Closed')" id="tab-Closed"
          class="px-4 sm:px-6 py-1.5 rounded-md text-xs sm:text-sm font-medium text-slate-600">
          Closed
        </button>
      </div>

      <div class="bg-white border rounded-lg p-3 sm:p-4 flex justify-between items-start gap-3 mb-6">
        <div class="flex items-center gap-3 min-w-0">
          <div
            class="bg-indigo-100 text-primary p-2 rounded-full h-9 w-9 sm:h-10 sm:w-10 flex items-center justify-center shrink-0">
            <i class="fa-solid fa-circle-dot text-sm sm:text-base"></i>
          </div>

          <div class="min-w-0">
            <h2 class="font-bold text-base sm:text-lg leading-tight">
              <span id="issueCount">0</span> Issues
            </h2>
            <p class="text-[11px] sm:text-xs text-slate-400 leading-tight">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div
          class="flex flex-col sm:flex-row items-end sm:items-center gap-1 sm:gap-4 text-[11px] sm:text-xs font-medium shrink-0">
          <span class="flex items-center gap-1">
            <span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-emerald-500"></span>
            Open
          </span>

          <span class="flex items-center gap-1">
            <span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-purple-500"></span>
            Closed
          </span>
        </div>
      </div>

      <div id="loadingSpinner" class="hidden justify-center py-10">
        <div class="loader"></div>
      </div>

      <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </main>
  </div>

  <!-- issue modal -->

  <div id="issueModal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden transform transition-all">
      <div class="p-6">
        <h2 id="modalTitle" class="text-2xl font-bold mb-2 text-slate-800"></h2>
        <div class="flex items-center gap-2 text-sm mb-4">
          <span id="modalStatus" class="px-3 py-0.5 rounded-full text-white font-bold text-xs"></span>
          <span class="text-slate-400">•</span>
          <span class="text-slate-500">Opened by
            <span id="modalAuthor" class="font-semibold text-slate-700"></span></span>
          <span class="text-slate-400">•</span>
          <span id="modalDate" class="text-slate-500"></span>
        </div>

        <div id="modalLabels" class="flex flex-wrap gap-2 mb-6"></div>

        <div class="mb-6">
          <p class="text-[11px] font-bold text-slate-400 uppercase mb-2">
            Description
          </p>
          <div id="modalDesc"
            class="text-slate-600 bg-slate-50 p-4 rounded-lg border border-slate-100 text-sm leading-relaxed"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 p-4 bg-slate-50/50 rounded-lg border border-slate-100">
          <div>
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">
              Assignee
            </p>
            <p id="modalAssignee" class="font-bold text-slate-800"></p>
          </div>
          <div>
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">
              Priority Level
            </p>
            <span id="modalPriority" class="px-3 py-1 rounded font-bold text-[10px] text-white inline-block"></span>
          </div>
        </div>

        <div class="mt-8 flex justify-end">
          <button onclick="closeModal()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-lg font-bold transition-all">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>

</html>
